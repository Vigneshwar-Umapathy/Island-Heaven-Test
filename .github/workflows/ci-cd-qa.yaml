name: Frontend CI/CD - Safemod (QA)

on:
  push:
    branches:
      - dev
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-qa.yml'

  pull_request:
    branches:
      - dev
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-qa.yml'

  workflow_dispatch:

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  frontend:
    uses: tensoractai/operation/.github/workflows/vite-nextjs-ci.yml@main
    with:
      node-version: '20'
      pnpm-version: '10'
      working-directory: 'frontend'
      aws-region: 'us-east-1'
      deploy-runner: 'qa-safemod'
      debug_enabled: false
      s3-bucket: ${{ vars.QA_S3_BUCKET_NAME }}
      deploy-path: ${{ vars.DEPLOYMENT_PATH_FRONTEND }}
      env-source-path: ${{ vars.ENV_FILE_SOURCE_FRONTEND }}
    secrets:
      aws-role-arn: ${{ secrets.QA_AWS_ROLE_ARN }}
